name: Bug report
description: Report a reproducible problem with the library
labels: [bug]
assignees: [joseporto]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for maintainers to reproduce it.

  - type: dropdown
    id: component
    attributes:
      label: Component / area
      description: Which component or area is affected?
      options:
        - NbButton
        - NbCheckbox
        - NbColorStrip
        - NbConcentricBox
        - NbGrid
        - NbIcon
        - NbInput
        - NbJsonTree
        - NbModal
        - NbPanel
        - NbRadio
        - NbSelect
        - NbToggle
        - NbWell
        - Styles / SCSS
        - Build / bundling
        - TypeScript types
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: package_version
    attributes:
      label: Package version
      placeholder: 1.0.0
    validations:
      required: true

  - type: input
    id: vue_version
    attributes:
      label: Vue version
      placeholder: 3.5.x
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: 20.x or 22.x
    validations:
      required: true

  - type: input
    id: bundler
    attributes:
      label: Bundler / framework
      placeholder: Vite, Nuxt, Webpack, etc.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A minimal code snippet or repository link that reproduces the issue.
      render: vue
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Import NbButton
        2. Pass prop ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, error messages, or related issues
